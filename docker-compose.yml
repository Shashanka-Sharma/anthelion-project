services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: anthelion
      POSTGRES_USER: anthelion
      POSTGRES_PASSWORD: anthelion
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anthelion -d anthelion"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  db_init:
    build: .
    command: python db_init.py
    environment:
      DATABASE_URL: postgresql://anthelion:anthelion@postgres:5432/anthelion
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro

  agent:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://anthelion:anthelion@postgres:5432/anthelion
      DATABASE_URL_ASYNC: postgresql+asyncpg://anthelion:anthelion@postgres:5432/anthelion
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db_init:
        condition: service_completed_successfully

volumes:
  postgres_data:
